<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
  <title>ONE BALANCE マイページ</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  
  <div id="loading" class="loading">
    <div class="loading-spinner"></div>
    <p>読み込み中...</p>
  </div>
  
  <div id="app" class="app" style="display:none;">
    
    <header class="header">
      <h1 class="logo">ONE BALANCE</h1>
      <p class="logo-sub">食事サポート</p>
    </header>
    
    <div class="greeting">
      <p><span id="greetingIcon">🌅</span> <span id="greetingText">おはようございます</span>、<span id="nickname">--</span>さん</p>
    </div>
    
    <section class="card weight-card">
      <h2 class="card-title">今日の体重</h2>
      
      <div class="weight-input-area">
        <button class="btn-adjust" onclick="adjustWeight(-1)">−1</button>
        <button class="btn-adjust" onclick="adjustWeight(-0.1)">−0.1</button>
        
        <div class="weight-display">
          <input type="number" id="weightInput" step="0.1" value="70.0" />
          <span class="weight-unit">kg</span>
        </div>
        
        <button class="btn-adjust" onclick="adjustWeight(0.1)">+0.1</button>
        <button class="btn-adjust" onclick="adjustWeight(1)">+1</button>
      </div>
      
      <button class="btn-primary" onclick="saveWeightHandler()">
        記録する
      </button>
      
      <p class="weight-info" id="weightInfo">
        昨日の体重: -- kg
      </p>
    </section>
    
    <section class="card graph-card">
      <h2 class="card-title">体重推移 <span class="card-sub">直近30日</span></h2>
      <div class="graph-container">
        <canvas id="weightChart"></canvas>
      </div>
      <div class="goal-display">
        目標 <span id="targetWeight">--</span>kg
        <span id="weightDiff" class="weight-diff">--</span>
      </div>
    </section>
    
    <section class="card pfc-card">
      <h2 class="card-title">今日のPFCバランス</h2>
      
      <div class="pfc-item">
        <div class="pfc-label">
          <span>タンパク質</span>
          <span class="pfc-value" id="pValue">-- / -- g</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill p-fill" id="pBar" style="width: 0%;"></div>
        </div>
      </div>
      
      <div class="pfc-item">
        <div class="pfc-label">
          <span>脂質</span>
          <span class="pfc-value" id="fValue">-- / -- g</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill f-fill" id="fBar" style="width: 0%;"></div>
        </div>
      </div>
      
      <div class="pfc-item">
        <div class="pfc-label">
          <span>炭水化物</span>
          <span class="pfc-value" id="cValue">-- / -- g</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill c-fill" id="cBar" style="width: 0%;"></div>
        </div>
      </div>
      
      <div class="calorie-summary">
        <span class="calorie-label">合計カロリー</span>
        <span class="calorie-value"><span id="totalCalorie">--</span> / <span id="targetCalorie">--</span> kcal</span>
      </div>
    </section>
    
    <section class="card food-card">
      <h2 class="card-title">今日の食事</h2>
      <div id="foodList" class="food-list">
        <div class="food-empty">まだ記録がありません</div>
      </div>
    </section>
    
    <section class="card water-card">
      <h2 class="card-title">水分</h2>
      
      <div class="water-display">
        <span id="waterTotal">--</span>L <span class="water-target">/ <span id="waterTarget">--</span>L</span>
      </div>
      
      <div class="progress-bar water-progress">
        <div class="progress-fill water-fill" id="waterBar" style="width: 0%;"></div>
      </div>
      
      <div class="water-buttons">
        <button class="btn-water" onclick="addWater(250)">+ 250ml</button>
        <button class="btn-water" onclick="addWater(500)">+ 500ml</button>
        <button class="btn-water" onclick="addWater(1000)">+ 1L</button>
      </div>
    </section>
    
    <section class="card streak-card">
      <h2 class="card-title">連続記録</h2>
      <div class="streak-display">
        <span class="streak-number" id="streakDays">--</span>
        <span class="streak-unit">日</span>
      </div>
      <div class="cheat-day-info">
        今週のチートデイ <span id="cheatDay">--</span>曜日
      </div>
    </section>
    
    <section class="account-section">
      <details class="account-details">
        <summary>アカウント設定</summary>
        <div class="account-content">
          <button class="btn-text" onclick="showProfile()">プロフィール変更</button>
          <button class="btn-text" onclick="showGoal()">目標体重を変更</button>
          <button class="btn-text-secondary" onclick="confirmPause()">サービスを休止する</button>
          <button class="btn-text-danger" onclick="confirmWithdraw()">退会する</button>
        </div>
      </details>
    </section>
    
    <footer class="footer">
      <p class="footer-brand">ONE BALANCE METHOD</p>
      <p class="footer-sub">ONE-TRE 監修</p>
    </footer>
    
  </div>
  
  <div id="errorMessage" class="error-message" style="display:none;">
    <p id="errorText">エラーが発生しました</p>
    <button onclick="hideError()">閉じる</button>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <script src="script.js"></script>
</body>
</html>
